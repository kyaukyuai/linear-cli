name: Setup Deno
description: Install Deno without relying on a Node-based GitHub Action runtime.
inputs:
  deno-version:
    description: The Deno version to install.
    default: "2.7.5"
runs:
  using: composite
  steps:
    - name: Install Deno (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        VERSION="v${{ inputs.deno-version }}"
        OS="$(uname -s)"
        ARCH="$(uname -m)"

        case "${OS}:${ARCH}" in
          Linux:x86_64) TARGET="x86_64-unknown-linux-gnu" ;;
          Linux:aarch64 | Linux:arm64) TARGET="aarch64-unknown-linux-gnu" ;;
          Darwin:x86_64) TARGET="x86_64-apple-darwin" ;;
          Darwin:arm64) TARGET="aarch64-apple-darwin" ;;
          *)
            echo "Unsupported platform: ${OS} ${ARCH}" >&2
            exit 1
            ;;
        esac

        INSTALL_DIR="$HOME/.deno/bin"
        ARCHIVE_URL="https://github.com/denoland/deno/releases/download/${VERSION}/deno-${TARGET}.zip"
        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "${TMP_DIR}"' EXIT

        mkdir -p "${INSTALL_DIR}"
        curl --fail --location --retry 5 --retry-all-errors --retry-delay 2 \
          --output "${TMP_DIR}/deno.zip" \
          "${ARCHIVE_URL}"
        unzip -q "${TMP_DIR}/deno.zip" -d "${TMP_DIR}"
        install "${TMP_DIR}/deno" "${INSTALL_DIR}/deno"
        echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

    - name: Install Deno (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $v = "${{ inputs.deno-version }}"
        irm https://deno.land/install.ps1 | iex
        "$env:USERPROFILE\\.deno\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify Deno installation
      shell: bash
      run: deno --version
